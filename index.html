<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALI LINUX • root@stratcom</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body {
            margin: 0;
            background: #000;
            color: #00ff41;
            font-family: 'VT323', monospace;
            overflow: hidden;
            height: 100vh;
            image-rendering: pixelated;
        }
        
        .header {
            background: #111;
            padding: 8px 20px;
            border-bottom: 2px solid #00ff41;
            display: flex;
            justify-content: space-between;
            font-size: 1.3em;
        }
        
        #terminal {
            height: calc(100vh - 52px);
            padding: 15px;
            overflow-y: auto;
            font-size: 1.45em;
            line-height: 1.4;
        }
        
        .prompt {
            color: #00cc33;
        }
        
        .line {
            display: flex;
            margin-bottom: 6px;
        }
        
        #input {
            background: transparent;
            border: none;
            color: #00ff41;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            flex: 1;
        }
        
        .output { color: #aaffaa; }
        .error { color: #ff5555; }
        .success { color: #00ffaa; }
        
        .blink {
            animation: blink 1s step-end infinite;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>root@stratcom: ~ # KALI LINUX 2026.2</div>
        <div>● LIVE TUNNEL</div>
    </div>
    
    <div id="terminal"></div>

    <script>
        const terminal = document.getElementById('terminal');
        let currentDir = '~';
        let history = [];
        let historyIndex = -1;
        
        const filesystem = {
            '~': ['tools/', 'targets/', 'loot/', 'exploits/'],
            'tools/': ['nmap', 'hydra', 'metasploit', 'gobuster'],
            'targets/': ['192.168.1.100', '10.0.0.45'],
            'loot/': ['passwords.txt', 'hashes.bin']
        };
        
        function print(text, cls = 'output') {
            const line = document.createElement('div');
            line.className = cls;
            line.textContent = text;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }
        
        function prompt() {
            const line = document.createElement('div');
            line.className = 'line';
            line.innerHTML = `<span class="prompt">root@stratcom:${currentDir}# </span><input id="input" autocomplete="off" autofocus>`;
            terminal.appendChild(line);
            const input = line.querySelector('#input');
            
            input.focus();
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const cmd = input.value.trim();
                    if (cmd) {
                        history.unshift(cmd);
                        historyIndex = -1;
                        execute(cmd);
                    }
                    input.remove();
                    prompt();
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (history.length > 0) {
                        historyIndex = Math.min(historyIndex + 1, history.length - 1);
                        input.value = history[historyIndex];
                    }
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (historyIndex > 0) {
                        historyIndex--;
                        input.value = history[historyIndex];
                    } else {
                        historyIndex = -1;
                        input.value = '';
                    }
                }
            });
        }
        
        function execute(cmd) {
            print(`root@stratcom:${currentDir}# ${cmd}`);
            
            const parts = cmd.toLowerCase().trim().split(' ');
            const command = parts[0];
            
            switch(command) {
                case 'help':
                    print("Available: ls, cd, pwd, cat, nmap, hydra, msfconsole, clear, whoami, ifconfig", "success");
                    break;
                case 'ls':
                    print(filesystem[currentDir] ? filesystem[currentDir].join('   ') : "Nothing here.");
                    break;
                case 'pwd':
                    print("/home/kali" + (currentDir === '~' ? '' : '/' + currentDir));
                    break;
                case 'clear':
                    terminal.innerHTML = '';
                    break;
                case 'whoami':
                    print("root");
                    break;
                case 'ifconfig':
                    print("eth0: 10.13.37.42  inet addr:10.13.37.42");
                    break;
                case 'nmap':
                    print("[+] Starting Nmap 7.92...", "success");
                    setTimeout(() => print("PORT   STATE SERVICE\n22/tcp open  ssh\n80/tcp open  http\n445/tcp open  microsoft-ds"), 800);
                    break;
                case 'hydra':
                    print("[+] Hydra v9.5 launching brute force...", "success");
                    setTimeout(() => print("[+] Password found: admin123"), 1200);
                    break;
                case 'msfconsole':
                    print("[*] Starting Metasploit Framework...", "success");
                    setTimeout(() => print("[+] Exploit successful - Meterpreter session opened"), 1500);
                    break;
                case 'cat':
                    if (parts[1] === 'passwords.txt') print("admin:password123\nroot:toor");
                    else print("File not found or empty.");
                    break;
                default:
                    print(`bash: ${command}: command not found`, "error");
            }
        }
        
        // Start
        print("Welcome to Kali Linux 2026.2 (rolling) x86_64");
        print("Last login: Today");
        print("");
        prompt();
    </script>
</body>
</html>
